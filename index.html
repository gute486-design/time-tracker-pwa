<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Tracker</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#4CAF50" />

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 16px;
        background: #f7f7f7;
      }

      h1 {
        margin-bottom: 24px;
      }

      .section {
        background: white;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .total {
        font-size: 32px;
        margin: 12px 0 20px;
      }

      .button-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      button {
        font-size: 20px;
        padding: 14px 0;
        border: none;
        border-radius: 10px;
        background: #4caf50;
        color: white;
      }

      .undo-button {
        margin-top: 12px;
        width: 100%;
        background: #f44336;
      }
    </style>
  </head>

  <body>
    <h1>Time Tracker</h1>

    <div class="section">
      <h2>S</h2>
      <div class="total"><span id="s">0</span></div>

      <div class="button-grid">
        <button onclick="add('S', 1)">+1</button>
        <button onclick="add('S', 5)">+5</button>
        <button onclick="add('S', 10)">+10</button>
        <button onclick="add('S', 25)">+25</button>
        <button onclick="add('S', 50)">+50</button>
        <button onclick="add('S', 100)">+100</button>
      </div>
    </div>

    <div class="section">
      <h2>E</h2>
      <div class="total"><span id="e">0</span></div>

      <div class="button-grid">
        <button onclick="add('E', 1)">+1</button>
        <button onclick="add('E', 5)">+5</button>
        <button onclick="add('E', 10)">+10</button>
        <button onclick="add('E', 25)">+25</button>
        <button onclick="add('E', 50)">+50</button>
        <button onclick="add('E', 100)">+100</button>
      </div>
    </div>

    <button class="undo-button" onclick="undo()">Undo</button>

    <script>
      let sTotal = 0;
      let eTotal = 0;
      let lastType = "";
      let lastValue = 0;

      function render() {
        document.getElementById("s").textContent = sTotal;
        document.getElementById("e").textContent = eTotal;
      }

      function getDayKey() {
        const now = new Date();
        const base = new Date(now);

        if (base.getHours() < 4) {
          base.setDate(base.getDate() - 1);
        }

        const year = base.getFullYear();
        const month = String(base.getMonth() + 1).padStart(2, "0");
        const day = String(base.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
      }

      function save() {
        localStorage.setItem("sTotal", sTotal);
        localStorage.setItem("eTotal", eTotal);
        localStorage.setItem("lastType", lastType);
        localStorage.setItem("lastValue", lastValue);
        localStorage.setItem("dayKey", getDayKey());
      }

      function load() {
        sTotal = Number(localStorage.getItem("sTotal")) || 0;
        eTotal = Number(localStorage.getItem("eTotal")) || 0;
        lastType = localStorage.getItem("lastType") || "";
        lastValue = Number(localStorage.getItem("lastValue")) || 0;
      }

      function resetIfNeeded() {
        const currentDayKey = getDayKey();
        const savedDayKey = localStorage.getItem("dayKey");

        if (!savedDayKey) {
          localStorage.setItem("dayKey", currentDayKey);
          return;
        }

        if (savedDayKey !== currentDayKey) {
          sTotal = 0;
          eTotal = 0;
          lastType = "";
          lastValue = 0;
          save();
        }

        localStorage.setItem("dayKey", currentDayKey);
      }

      function add(type, value) {
        lastType = type;
        lastValue = value;

        if (type === "S") {
          sTotal += value;
        } else if (type === "E") {
          eTotal += value;
        }

        save();
        render();
      }

      function undo() {
        if (lastType === "S") {
          sTotal -= lastValue;
        } else if (lastType === "E") {
          eTotal -= lastValue;
        }

        lastType = "";
        lastValue = 0;

        save();
        render();
      }

      load();
      resetIfNeeded();
      render();
    </script>
  </body>
</html>
